name: Snemovna Streamer V4 - Stabilni
on:
  schedule:
    - cron: '0 7,12,17 * * 1-5'
  workflow_dispatch:

jobs:
  stream:
    runs-on: ubuntu-22.04
    timeout-minutes: 350
    steps:
      - name: Install FFmpeg
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg

      - name: Restream logic
        run: |
          echo "Startuji stabilní přenos s optimalizací pro YouTube..."
          
          # Výpočet konce (cca 5.6 hodiny)
          end=$((SECONDS+20400))
          
          while [ $SECONDS -lt $end ]; do
            echo "Zkouším se připojit k vysílání..."
            
            # -re (čtení v reálném čase)
            # -vcodec copy (přímé kopírování obrazu bez zátěže)
            # -acodec aac (standardizace zvuku pro YT)
            # -flvflags no_duration_filesize (klíčové pro plynulost live streamu)
            ffmpeg -re -i "https://pspcr-ott-live.ssl.cdn.cra.cz/channels/ps-stream1/playlist/cze.m3u8" \
              -vcodec copy \
              -acodec aac -ab 128k -ar 44100 \
              -f flv -flvflags no_duration_filesize \
              -metadata streamName="Snemovna_Zive" \
              "rtmp://a.rtmp.youtube.com/live2/${{ secrets.YOUTUBE_STREAM_KEY }}" || echo "Výpadek signálu, restartuji za 30s..."

            sleep 30
          done
