name: Snemovna Streamer
on:
  schedule:
    - cron: '0 7,12,17 * * 1-5'
  workflow_dispatch:

jobs:
  stream:
    runs-on: ubuntu-latest
    timeout-minutes: 350
    steps:
      - name: Install FFmpeg
        run: sudo apt-get update && sudo apt-get install -y ffmpeg

      - name: Restream logic
        run: |
          echo "Startuji ostrou verzi bez kontrol..."
          end=$((SECONDS+20400))
          
          while [ $SECONDS -lt $end ]; do
            # Pokus 1: HTTPS verze
            echo "Zkouším HTTPS odkaz..."
            ffmpeg -re -i "https://pspcr-ott-live.ssl.cdn.cra.cz/channels/ps-stream1/playlist/cze.m3u8" \
              -c copy -f flv "rtmp://a.rtmp.youtube.com/live2/${{ secrets.YOUTUBE_STREAM_KEY }}" || echo "HTTPS selhalo."

            # Pokus 2: HTTP verze (nezabezpečená - někdy funguje lépe)
            echo "Zkouším HTTP odkaz..."
            ffmpeg -re -i "http://pspcr-ott-live.ssl.cdn.cra.cz/channels/ps-stream1/playlist/cze.m3u8" \
              -c copy -f flv "rtmp://a.rtmp.youtube.com/live2/${{ secrets.YOUTUBE_STREAM_KEY }}" || echo "HTTP selhalo."

            echo "Čekám 30 sekund před dalším pokusem..."
            sleep 30
          done
