name: Snemovna Streamer V4 - Stabilni
on:
  schedule:
    # 07:00 UTC = 09:00 našeho času (v létě)
    # 13:00 UTC = 15:00 našeho času (restart pro odpolední blok)
    - cron: '0 7,13 * * *'
  workflow_dispatch:

jobs:
  stream:
    runs-on: ubuntu-22.04
    timeout-minutes: 350
    steps:
      - name: Install FFmpeg
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg

      - name: Restream logic
        run: |
          echo "Startuji stabilní přenos s nuceným datovým tokem..."
          
          end=$((SECONDS+20500))
          
          while [ $SECONDS -lt $end ]; do
            echo "Připojuji se a stabilizuji signál..."
            
            # ZMĚNA: libx264 a fixní bitrate 4000k zajistí, že bar bude pořád ZELENÝ
            ffmpeg -re -i "https://pspcr-ott-live.ssl.cdn.cra.cz/channels/ps-stream1/playlist/cze.m3u8" \
              -vcodec libx264 -preset veryfast -r 25 -g 50 -b:v 4000k -maxrate 4000k -bufsize 8000k \
              -pix_fmt yuv420p -acodec aac -ab 128k -ar 44100 \
              -f flv -flvflags no_duration_filesize \
              "rtmp://a.rtmp.youtube.com/live2/${{ secrets.YOUTUBE_STREAM_KEY }}" || echo "Restart za 30s..."

            sleep 30
          done
