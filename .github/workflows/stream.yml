name: Snemovna Streamer V2
on:
  schedule:
    - cron: '0 7,12,17 * * 1-5'
  workflow_dispatch:

jobs:
  stream:
    runs-on: ubuntu-22.04
    timeout-minutes: 350
    steps:
      - name: Install FFmpeg
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg

      - name: Restream logic
        run: |
          echo "Startuji stabilní verzi na Ubuntu 22.04..."
          end=$((SECONDS+20400))
          
          while [ $SECONDS -lt $end ]; do
            echo "Zkouším se připojit k vysílání..."
            
            # Opravené pořadí parametrů: ffmpeg -> -4 -> vstup
            ffmpeg -4 -re -i "https://pspcr-ott-live.ssl.cdn.cra.cz/channels/ps-stream1/playlist/cze.m3u8" \
              -vcodec copy \
              -acodec aac -ab 128k -ar 44100 \
              -f flv "rtmp://a.rtmp.youtube.com/live2/${{ secrets.YOUTUBE_STREAM_KEY }}" || echo "Spojení přerušeno, zkusím to znovu..."

            sleep 30
          done
