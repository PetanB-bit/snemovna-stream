name: Snemovna Streamer
on:
  schedule:
    # Startuje v pracovní dny ráno, v poledne a odpoledne (kontinuita po 5h)
    - cron: '0 7,12,17 * * 1-5'
  workflow_dispatch: # Umožňuje spustit stream ručně tlačítkem

jobs:
  stream:
    runs-on: ubuntu-latest
    timeout-minutes: 350 # Bezpečnostní limit GitHubu (max 6h)
    steps:
      - name: Install FFmpeg
        run: sudo apt-get update && sudo apt-get install -y ffmpeg

      - name: Restream logic
        run: |
          echo "Startuji vysílací systém se stabilizací zvuku..."
          # Nastavení času, po kterém se skript sám ukončí (cca 5 hod 40 min)
          end=$((SECONDS+20400))
          
          while [ $SECONDS -lt $end ]; do
            echo "Zkouším se připojit ke zdroji Sněmovny..."
            
            # FFmpeg příkaz:
            # -re: čte data v reálném čase (nutné pro YouTube)
            # -vcodec copy: nekóduje obraz znovu (šetří výkon a kvalitu)
            # -acodec aac -ab 128k -ar 44100: opravuje zvuk do standardu YouTube
            ffmpeg -re -i "https://pspcr-ott-live.ssl.cdn.cra.cz/channels/ps-stream1/playlist/cze.m3u8" \
              -vcodec copy \
              -acodec aac -ab 128k -ar 44100 \
              -f flv "rtmp://a.rtmp.youtube.com/live2/${{ secrets.YOUTUBE_STREAM_KEY }}" || echo "Stream přerušen nebo nedostupný."

            echo "Spojení ztraceno. Zkusím se znovu připojit za 30 sekund..."
            sleep 30
          done
          echo "Pracovní směna robota skončila. Štafetu převezme další naplánovaný běh."
