name: Snemovna Streamer V4 - Stabilni
on:
  schedule:
    # 06:52 UTC = 08:52 našeho času (LČ)
    # 12:52 UTC = 14:52 našeho času (LČ)
    - cron: '52 6,12 * * *'
  workflow_dispatch:

jobs:
  stream:
    runs-on: ubuntu-22.04
    timeout-minutes: 350
    steps:
      - name: Install FFmpeg
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg

      - name: Restream logic
        run: |
          echo "Startuji s předstihem v 8:55 pro zachycení začátku schůze..."
          
          # Výpočet konce běhu (cca 5.7 hodiny)
          end=$((SECONDS+20500))
          
          while [ $SECONDS -lt $end ]; do
            echo "Připojuji se ke zdroji a synchronizuji audio/video..."
            
            ffmpeg -re \
              -reconnect 1 -reconnect_at_eof 1 -reconnect_streamed 1 -reconnect_delay_max 5 \
              -thread_queue_size 1024 \
              -i "https://pspcr-ott-live.ssl.cdn.cra.cz/channels/ps-stream1/playlist/cze.m3u8" \
              -vcodec libx264 -preset veryfast -r 25 -g 50 -b:v 4000k -maxrate 4000k -bufsize 8000k \
              -pix_fmt yuv420p -vsync 1 \
              -acodec aac -ab 128k -ar 44100 -ac 2 \
              -af "aresample=async=1:min_hard_comp=0.100000:first_pts=0" \
              -f flv -flvflags no_duration_filesize \
              -metadata streamName="Snemovna_Zive" \
              "rtmp://a.rtmp.youtube.com/live2/${{ secrets.YOUTUBE_STREAM_KEY }}" || echo "Zdroj zatím není dostupný, zkusím to znovu za 30s..."

            sleep 30
          done
